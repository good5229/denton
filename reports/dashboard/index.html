<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Regional GVA Forecast Dashboard</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Denton Regional GVA</p>
        <h1>예측값·실제값 비교 대시보드</h1>
      </div>
      <div id="loadStatus" class="status">CSV 로딩 중</div>
    </header>

    <section class="controls" aria-label="filters">
      <label>
        지역 수준
        <select id="levelSelect">
          <option value="sido">시도</option>
          <option value="sigungu">시군구</option>
          <option value="detail">시군구 세부산업</option>
          <option value="emd">읍면동</option>
        </select>
      </label>
      <label>
        지역
        <button type="button" id="regionPickerButton" class="picker-button">지역 선택</button>
        <select id="regionSelect" hidden></select>
      </label>
      <label>
        산업군
        <button type="button" id="sectorPickerButton" class="picker-button">산업군 선택</button>
        <select id="sectorSelect" hidden></select>
      </label>
      <label>
        시점 단위
        <select id="grainSelect">
          <option value="annual">연도</option>
          <option value="quarter">분기</option>
          <option value="month">월간</option>
        </select>
      </label>
      <label>
        시작
        <select id="startSelect"></select>
      </label>
      <label>
        종료
        <select id="endSelect"></select>
      </label>
    </section>

    <section class="selected-strip" aria-label="selected filters">
      <div>
        <span>선택 지역</span>
        <div id="selectedRegions" class="chip-row"></div>
      </div>
      <div>
        <span>선택 산업군</span>
        <div id="selectedSectors" class="chip-row"></div>
      </div>
    </section>

    <section class="summary" aria-label="summary metrics">
      <article>
        <span>예측 행</span>
        <strong id="metricRows">-</strong>
      </article>
      <article>
        <span>비교 가능 행</span>
        <strong id="metricComparable">-</strong>
      </article>
      <article>
        <span>MAPE</span>
        <strong id="metricMape">-</strong>
      </article>
      <article>
        <span>최신 예측</span>
        <strong id="metricLatest">-</strong>
      </article>
      <article>
        <span>신뢰 등급</span>
        <strong id="metricConfidence">-</strong>
      </article>
    </section>

    <section id="confidencePanel" class="confidence-panel" aria-label="confidence information"></section>

    <section id="message" class="message" hidden></section>

    <section class="panel">
      <div class="panel-head">
        <h2 id="chartTitle">그래프</h2>
        <span id="chartSubtitle"></span>
      </div>
      <svg id="chart" viewBox="0 0 1120 420" role="img" aria-label="prediction chart"></svg>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>테이블</h2>
        <span id="tableNote">원천 CSV: data/processed/*.csv (CP949)</span>
      </div>
      <div class="table-wrap">
        <table id="resultTable"></table>
      </div>
    </section>
  </main>

  <div id="pickerModal" class="modal-backdrop" hidden>
    <section class="modal" role="dialog" aria-modal="true" aria-labelledby="pickerTitle">
      <div class="modal-head">
        <h2 id="pickerTitle">선택</h2>
        <button type="button" id="pickerClose" class="icon-button" aria-label="닫기">×</button>
      </div>
      <p id="pickerScope" class="modal-scope"></p>
      <div class="modal-tools">
        <input id="pickerSearch" type="search" placeholder="검색어를 입력하세요">
        <span id="pickerCount"></span>
      </div>
      <div class="modal-bulk">
        <button type="button" id="pickerToggleVisible">검색 결과 전체 선택</button>
      </div>
      <div id="pickerOptions" class="picker-options"></div>
      <div class="modal-actions">
        <button type="button" id="pickerClear">선택 해제</button>
        <button type="button" id="pickerApply" class="primary-button">적용</button>
      </div>
    </section>
  </div>

  <script src="./app.js"></script>
</body>
</html>
